<!DOCTYPE html>
<html>
<head>
    <title>1.2.5 Paragraphs Assignment</title>

    <!-- Internal CSS -->
    <style>
        .internal-paragraph {
            color: orange;
            font-weight: bold;
        }

        .internal-highlight {
            color: green;
        }

        .internal-building {
            color: brown;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Paragraphs</h2>

    <!-- Paragraph 1 - Inline CSS (Blue, Italic) -->
    <p style="color: blue; font-style: italic;">
        Paragraph 1 - Styled using inline CSS.
    </p>

    <!-- Paragraph 2 - Internal CSS (Orange, Bold) -->
    <p class="internal-paragraph">
        Paragraph 2 - Styled using internal CSS.
    </p>

    <!-- Paragraph 3 - External CSS (Purple, Underline) -->
    <p class="external-paragraph">
        Paragraph 3 - Styled using external CSS.
    </p>

    <!-- Highlight 1 - Inline CSS -->
    <h1 style="color: red; background-color: yellow;">
        Highlight 1 - Inline CSS
    </h1>

    <!-- Highlight 2 - Internal CSS -->
    <h1 class="internal-highlight">
        Highlight 2 - Internal CSS
    </h1>

    <!-- Highlight 3 - External CSS -->
    <h1 class="external-highlight">
        Highlight 3 - External CSS
    </h1>

    <!-- Building 1 - Inline -->
    <h3 style="color: blue;">
        Building 1 - Inline CSS
    </h3>

    <!-- Building 2 - Internal -->
    <h3 class="internal-building">
        Building 2 - Internal CSS
    </h3>

    <!-- Building 3 - External -->
    <h3 class="external-building">
        Building 3 - External CSS
    </h3>

</body>
</html>
